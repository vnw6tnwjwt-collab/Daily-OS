<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{-webkit-text-size-adjust:100%;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{-webkit-text-size-adjust:100%;}
body{background:#F2EBE2;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Helvetica Neue',sans-serif;font-size:15px;line-height:1.5;color:#3A2E28;min-height:100vh;padding-bottom:calc(52px + env(safe-area-inset-bottom));-webkit-font-smoothing:antialiased;}
*{font-family:inherit;font-size:inherit;line-height:inherit;color:inherit;}
button{font-family:inherit;-webkit-tap-highlight-color:transparent;cursor:pointer;touch-action:manipulation;}
textarea,input{font-family:inherit;}
textarea:focus,button:focus,input:focus{outline:none;}
::-webkit-scrollbar{display:none;}
.nav{position:sticky;top:0;z-index:100;background:#F2EBE2;border-bottom:1px solid #EAE0D6;padding:12px 16px 10px;display:flex;justify-content:space-between;align-items:center;}
.nav-left{display:flex;align-items:center;gap:9px;}
.nav-title{font-size:13px;letter-spacing:2.5px;text-transform:uppercase;color:#7A9E7E;font-weight:600;}
.sync-dot{width:6px;height:6px;border-radius:50%;background:#C4B8B0;flex-shrink:0;transition:background .3s;}
.sync-dot.ok{background:#7A9E7E;}.sync-dot.err{background:#C17060;}
.sync-dot.syncing{background:#C17F6B;animation:pulse .8s ease infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}
.sync-txt{font-size:11px;color:#B0A49C;}
.nav-tabs{display:flex;gap:4px;}
.nav-tab{font-size:11.5px;font-weight:500;padding:5px 11px;border-radius:100px;border:1.5px solid #C9BCB4;background:transparent;color:#9E9089;transition:all .2s;}
.nav-tab.active{background:#3A2E28;color:#F2EBE2;border-color:#3A2E28;}
.page{max-width:620px;margin:0 auto;padding:14px 14px 20px;display:flex;flex-direction:column;gap:10px;}

/* BANNERS */
.return-banner{background:#F0F7F0;border:1px solid #C4DCC4;border-radius:12px;padding:11px 15px;display:flex;justify-content:space-between;align-items:center;gap:10px;}
.return-text{font-size:13px;color:#3A6040;line-height:1.4;flex:1;}
.banner-close{font-size:18px;color:#A8C4A8;background:none;border:none;line-height:1;padding:0 2px;}
.continuity-banner{border-radius:12px;padding:11px 15px;display:flex;justify-content:space-between;align-items:center;gap:10px;}
.continuity-banner.rough{background:#FEF0EE;border:1px solid #F0D0C8;}
.continuity-banner.restless{background:#FFF8E8;border:1px solid #E8D8A0;}
.continuity-banner.tired{background:#F0F0F8;border:1px solid #C8C8E0;}
.continuity-banner.settled{background:#F0F7F0;border:1px solid #C4DCC4;}
.continuity-banner-text{font-size:13px;line-height:1.4;flex:1;}
.continuity-banner.rough .continuity-banner-text{color:#8B4020;}
.continuity-banner.restless .continuity-banner-text{color:#7A5A10;}
.continuity-banner.tired .continuity-banner-text{color:#4A4A7A;}
.continuity-banner.settled .continuity-banner-text{color:#3A6040;}

/* OMT CARD */
.omt-card{background:#FFFCF8;border-radius:18px;padding:18px;border:1.5px solid #C17F6B;}
.omt-card-label{font-size:9.5px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#C17F6B;margin:0 0 4px;display:block;}
.omt-card-desc{font-size:12px;color:#B0A49C;margin:0 0 10px;line-height:1.5;display:block;}
.omt-input{width:100%;padding:11px 13px;border:1.5px solid #EAE0D6;border-radius:10px;font-size:14px;color:#3A2E28;background:#F7F1EB;line-height:1.5;transition:border-color .2s;}
.omt-input:focus{border-color:#C17F6B;}
.omt-input::placeholder{color:#C4B8B0;}
.omt-hint{font-size:11px;color:#B0A49C;margin-top:5px;font-style:italic;display:block;}
.maint-label{font-size:9px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:#C4B8B0;margin:12px 0 5px;display:block;}
.maint-ta{width:100%;min-height:42px;border:0.5px solid #EAE0D6;border-radius:9px;padding:9px 12px;font-size:13px;color:#7A6A60;background:#F7F3EE;resize:none;line-height:1.5;}
.maint-ta::placeholder{color:#C4B8B0;}

/* MODE CARD */
.mode-card{background:#FFFCF8;border-radius:16px;padding:16px;border:1px solid #EAE0D6;}
.mode-row{display:flex;gap:6px;}
.mode-btn{flex:1;padding:9px 6px;border-radius:11px;border:1.5px solid #DDD4CA;background:transparent;font-size:12px;font-weight:500;color:#9E9089;transition:all .2s;line-height:1.3;text-align:center;}
.mode-btn.survival.active{background:#FDE8D8;border-color:#8B4020;color:#8B4020;}
.mode-btn.steady.active{background:#D4EAD5;border-color:#2A5C30;color:#2A5C30;}
.mode-btn.growth.active{background:#E8F4D4;border-color:#2A5020;color:#2A5020;}
.mode-btn.rest.active{background:#EEF0FA;border-color:#4A4880;color:#4A4880;}
.mode-sub{font-size:13px;color:#6B5A52;font-style:italic;margin-top:8px;line-height:1.4;}

/* SECTIONS */
.section{border-radius:16px;border:1px solid #EAE0D6;overflow:hidden;background:#FFFCF8;}
.section.open{border-color:#D8CEC4;}
.section-hdr{display:flex;justify-content:space-between;align-items:center;width:100%;padding:13px 16px;background:none;border:none;text-align:left;gap:10px;}
.section-hdr-left{display:flex;align-items:center;gap:9px;flex:1;min-width:0;}
.section-icon{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;}
.section-title{font-size:14px;font-weight:500;color:#3A2E28;line-height:1.2;}
.section-sub{font-size:11px;color:#B0A49C;margin-top:1px;}
.section-meta{display:flex;align-items:center;gap:7px;flex-shrink:0;}
.section-pill{font-size:10px;font-weight:500;padding:2px 9px;border-radius:100px;background:#EAE0D6;color:#7A6A60;}
.section-pill.done{background:#D4EAD5;color:#2A5C30;}
.section-chev{color:#C9BCB4;font-size:13px;display:inline-block;transition:transform .25s;flex-shrink:0;}
.section-chev.open{transform:rotate(180deg);}
.section-body{display:none;padding:0 16px 14px;}
.section-body.open{display:block;}
.sub-slabel{font-size:8.5px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:#C4B8B0;margin:12px 0 6px;display:block;}
.sub-slabel:first-child{margin-top:0;}
.bonus-div{height:1px;background:#EAE0D6;margin:10px 0 8px;}

/* CHECKS */
.check-btn{display:flex;align-items:flex-start;gap:10px;background:none;border:none;padding:6px 0;text-align:left;width:100%;touch-action:manipulation;}
.check-circle{margin-top:2px;width:20px;height:20px;border-radius:50%;flex-shrink:0;border:1.5px solid #C9BCB4;background:transparent;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.check-circle.done{border-color:#7A9E7E;background:#7A9E7E;}
.check-circle.bon{border-color:#D8CFC8;}.check-circle.bon.done{border-color:#A8C4A8;background:#A8C4A8;}
.check-circle.sub{border-color:#DDD4CA;width:17px;height:17px;margin-top:3px;}
.check-circle.sub.done{border-color:#A8C4A8;background:#A8C4A8;}
.check-label{font-size:14px;line-height:1.4;color:#3A2E28;display:block;transition:all .2s;}
.check-label.done{color:#A89E96;text-decoration:line-through;}
.check-label.bon{font-size:13px;color:#8A7A72;}.check-label.bon.done{color:#C0B4AC;}
.check-label.sub{font-size:13px;color:#6B5A52;}.check-label.sub.done{color:#B0A49C;text-decoration:line-through;}
.check-note{display:block;font-size:11px;color:#B0A49C;margin-top:2px;line-height:1.4;}
.check-min{display:block;font-size:10.5px;color:#C17F6B;margin-top:1px;font-style:italic;}
.sub-checks{padding-left:30px;margin-top:2px;}

/* PILLS */
.pill-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px;}
.pill{display:inline-flex;align-items:center;gap:4px;padding:4px 11px;border-radius:100px;font-size:11px;font-weight:500;background:#EAE0D6;color:#7A6A60;transition:all .3s;}
.pill.done{background:#D4EAD5;color:#2A5C30;}

.frozen-card{background:#F7F3EE;border-radius:12px;padding:13px 14px;border:1px solid #EAE0D6;}
.frozen-lbl{font-size:9.5px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#B0A49C;display:block;margin-bottom:2px;}
.frozen-mvd{font-size:10px;color:#C4B8B0;display:block;margin-bottom:8px;font-style:italic;}
.frozen-steps{display:flex;flex-wrap:wrap;gap:6px;}
.frozen-step{font-size:12px;color:#6B5A52;background:#FFFCF8;border-radius:20px;padding:5px 12px;border:1px solid #EAE0D6;cursor:pointer;transition:all .2s;user-select:none;-webkit-user-select:none;}
.frozen-step.done{background:#7A9E7E;border-color:#7A9E7E;color:#FFFFFF;font-weight:500;}

/* SHIFT STATE */
.shift-gate{background:#FBF8F4;border-radius:12px;padding:14px;border:1px solid #EAE0D6;margin-bottom:6px;}
.shift-gate-q{font-size:13px;color:#4A3A34;line-height:1.5;margin-bottom:10px;}
.shift-gate-btns{display:flex;gap:8px;}
.shift-gate-btn{flex:1;padding:9px;border-radius:10px;border:1px solid #EAE0D6;background:transparent;font-size:13px;color:#5A4A42;transition:all .15s;}
.shift-gate-btn.yes{border-color:#7A7EAE;background:#F0EDF8;color:#4A4880;}
.need-grid{display:flex;flex-wrap:wrap;gap:7px;}
.need-btn{display:inline-flex;padding:7px 14px;border-radius:20px;border:1px solid #EAE0D6;background:#FFFCF8;font-size:13px;color:#6B5A52;cursor:pointer;transition:all .2s;margin-bottom:4px;}
.need-btn.sel{border-color:#7A9E7E;background:#7A9E7E;color:#FFFFFF;font-weight:500;}
.need-items{display:flex;flex-wrap:wrap;gap:7px;margin-top:10px;padding-top:10px;border-top:1px solid #EAE0D6;padding-bottom:10px;border-bottom:1px solid #EAE0D6;margin-bottom:4px;}
.need-item{display:inline-flex;align-items:center;gap:8px;padding:6px 12px;border-radius:20px;background:#FFFCF8;font-size:13px;color:#6B5A52;border:1px solid #EAE0D6;cursor:pointer;transition:all .2s;margin-bottom:4px;}

/* RESET / COLLAPSE-DRIFT */
.cd-row{display:flex;gap:8px;margin-bottom:10px;}
.cd-btn{flex:1;padding:8px 12px;border-radius:20px;border:1px solid #EAE0D6;background:#FFFCF8;font-size:13px;font-weight:500;color:#6B5A52;cursor:pointer;transition:all .2s;text-align:center;}
.cd-btn.collapse.active{background:#3A2E28;border-color:#3A2E28;color:#FFFCF8;}
.cd-btn.drift.active{background:#3A2E28;border-color:#3A2E28;color:#FFFCF8;}
.cd-response{background:#FEF5F4;border-radius:10px;padding:12px 14px;margin-bottom:10px;border:1px solid #EAE0D6;}
.cd-response.drift-resp{background:#FFFBF0;border-color:#E8D8A0;}
.reset-title{font-size:14px;font-weight:600;color:#B85C54;margin:0 0 10px;}
.reset-night{background:#F7F3EE;border:1px solid #EAE0D6;border-radius:9px;padding:10px 12px;margin:10px 0;}
.reset-night-title{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#A89E96;margin:0 0 3px;}
.reset-night-text{font-size:12.5px;color:#6B5A52;line-height:1.5;}
.reset-no{margin-top:8px;padding:10px 12px;border-radius:9px;background:#F7F3EE;border:1px solid #EAE0D6;}
.reset-no-title{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#A89E96;margin:0 0 5px;}
.reset-no-item{font-size:13px;color:#6B5A52;padding:2px 0;line-height:1.4;}

/* HOW AM I LEAVING TODAY */
.leaving-card{background:#FFFCF8;border-radius:16px;padding:16px;border:1px solid #EAE0D6;}
.entering-label{font-size:9.5px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#C17F6B;margin:0 0 10px;display:block;}
.leaving-label{font-size:9.5px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#7A7EAE;margin:0 0 10px;display:block;}
.mood-close-row{display:flex;gap:6px;}
.mood-close-btn{flex:1;padding:9px 6px;border-radius:11px;border:1.5px solid #DDD4CA;background:transparent;font-size:12px;font-weight:500;color:#9E9089;transition:all .2s;text-align:center;line-height:1.3;}
.mood-close-btn.settled.active{background:#F0F7F0;border-color:#3A6040;color:#3A6040;}
.mood-close-btn.restless.active{background:#FFF8E8;border-color:#A07820;color:#7A5A10;}
.mood-close-btn.tired.active{background:#F0F0F8;border-color:#4A4A7A;color:#4A4A7A;}
.mood-close-btn.rough.active{background:#FDE8D8;border-color:#8B4020;color:#8B4020;}
.leaving-divider{height:1px;background:#EAE0D6;margin:0 0 14px;}
.leaving-q-label{font-size:9.5px;color:#A89E96;margin:0 0 5px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;display:block;}
.leaving-q-label.optional-lbl{display:flex;align-items:center;gap:6px;}
.leaving-optional{font-size:11px;color:#C4B8B0;font-weight:400;letter-spacing:0;text-transform:none;}
.leaving-ta{width:100%;min-height:46px;border:0.5px solid #EAE0D6;border-radius:9px;padding:9px 11px;font-size:13px;color:#3A2E28;background:#F7F1EB;resize:none;line-height:1.5;}
.leaving-ta::placeholder{color:#C4B8B0;}
.leaving-ta + .leaving-q-label{margin-top:12px;}
.leaving-inp{width:100%;padding:9px 11px;border:0.5px solid #EAE0D6;border-radius:9px;font-size:13px;color:#3A2E28;background:#F7F1EB;line-height:1.5;}
.leaving-inp::placeholder{color:#C4B8B0;}
.leaving-inp-small{width:100%;padding:8px 11px;border:0.5px solid #EAE0D6;border-radius:9px;font-size:12px;color:#6B5A52;background:#F7F3EE;line-height:1.5;}
.leaving-inp-small::placeholder{color:#C4B8B0;}
.weekly-card{background:#F7F3EE;border-radius:11px;padding:13px;border:1px solid #E8DDD6;margin-top:12px;}
.weekly-q{font-size:13px;color:#4A3A34;line-height:1.5;margin-bottom:8px;font-style:italic;}

/* RULES */
.rule-row{display:flex;gap:8px;align-items:flex-start;margin-bottom:8px;}
.rule-num{width:17px;height:17px;border-radius:50%;background:#EAE0D6;display:flex;align-items:center;justify-content:center;font-size:9px;color:#9E9089;flex-shrink:0;margin-top:2px;font-weight:700;}

/* CONTINUITY */
.cont-title{font-size:24px;font-weight:500;color:#241C18;margin:0 0 2px;}
.cont-sub{font-size:13px;color:#9E9089;margin:0 0 14px;font-style:italic;}
.cont-insights{display:flex;flex-direction:column;gap:8px;margin-bottom:20px;}
.cont-insight{background:#FFFCF8;border-radius:12px;padding:12px 14px;border:1px solid #EAE0D6;font-size:13px;color:#4A3A34;line-height:1.5;}
.cont-insight-empty{font-size:13px;color:#B0A49C;font-style:italic;text-align:center;padding:20px 0;}
.hist-section-title{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#B0A49C;margin:0 0 10px;}
.hist-entry{border-radius:14px;border:1px solid #EAE0D6;overflow:hidden;margin-bottom:8px;background:#FFFCF8;}
.hist-hdr{display:flex;justify-content:space-between;align-items:center;width:100%;padding:11px 14px;background:none;border:none;text-align:left;}
.hist-body{padding:8px 14px 12px;display:none;border-top:1px solid #EAE0D6;}
.hist-body.open{display:block;}

/* JOURNAL */
.journal-date-title{font-size:24px;font-weight:500;color:#241C18;margin:0 0 2px;}
.journal-date-day{font-size:13px;color:#9E9089;margin:0 0 14px;font-style:italic;}
.journal-entry-wrap{background:#FFFCF8;border-radius:16px;border:1px solid #EAE0D6;overflow:hidden;margin-bottom:10px;}
.journal-entry-hdr{padding:14px 16px 0;}
.journal-entry-label{font-size:9.5px;font-weight:700;letter-spacing:2px;text-transform:uppercase;display:block;margin-bottom:8px;}
.journal-entry-label.morning{color:#C17F6B;}.journal-entry-label.evening{color:#7A7EAE;}
.journal-ta{width:100%;min-height:120px;border:0.5px solid #EAE0D6;border-radius:10px;padding:11px 13px;font-size:14px;color:#3A2E28;background:#F7F1EB;resize:none;line-height:1.6;}
.journal-ta::placeholder{color:#C4B8B0;font-style:italic;}
.journal-entry-footer{padding:8px 16px 14px;display:flex;justify-content:flex-end;}
.journal-char-count{font-size:11px;color:#C4B8B0;}
.journal-past-hdr-lbl{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#B0A49C;margin:20px 0 10px;display:block;}
.journal-past-entry{border-radius:14px;border:1px solid #EAE0D6;overflow:hidden;margin-bottom:8px;background:#FFFCF8;}
.journal-past-hdr-btn{display:flex;justify-content:space-between;align-items:center;width:100%;padding:11px 14px;background:none;border:none;text-align:left;}
.journal-past-date{font-size:14px;font-weight:500;color:#3A2E28;margin:0;}
.journal-past-preview{font-size:12px;color:#B0A49C;margin:2px 0 0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:220px;}
.journal-past-body{padding:10px 14px 14px;display:none;border-top:1px solid #EAE0D6;}
.journal-past-body.open{display:block;}
.journal-past-section{margin-bottom:12px;}.journal-past-section:last-child{margin-bottom:0;}
.journal-past-section-lbl{font-size:9.5px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#B0A49C;display:block;margin-bottom:5px;}
.journal-past-text{font-size:13px;color:#4A3A34;line-height:1.6;white-space:pre-wrap;}

/* SETTINGS */
.settings-card{background:#FFFCF8;border-radius:16px;padding:18px;border:1px solid #EAE0D6;margin-bottom:10px;}
.settings-field{display:flex;flex-direction:column;gap:6px;margin-bottom:14px;}
.settings-label{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#A89E96;}
.settings-input{padding:10px 12px;border-radius:10px;border:1px solid #EAE0D6;font-size:13px;color:#3A2E28;background:#F7F1EB;width:100%;}
.settings-btn{width:100%;padding:12px;border-radius:12px;border:none;background:#3A2E28;color:#F2EBE2;font-size:14px;font-weight:500;margin-top:6px;}
.settings-btn.secondary{background:#EAE0D6;color:#5A4A42;}
.settings-btn.danger{background:#FEF5F4;color:#C17060;border:1px solid #F0D5D0;}

/* MISC */
.section-intro{font-size:10px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:#B0A49C;margin:0 0 10px;display:block;}
.footer-msg{text-align:center;font-size:13px;font-style:italic;color:#B0A49C;margin:6px 0 0;padding-bottom:6px;}
.header-h1{font-size:26px;font-weight:500;color:#241C18;margin:0;line-height:1.1;}
.header-phrase{font-size:13px;font-style:italic;color:#9E9089;margin:3px 0 0;line-height:1.4;}
.carry{display:flex;align-items:flex-start;gap:8px;padding:7px 12px;border-radius:9px;background:#F7F1EB;border:0.5px solid #EAE0D6;flex-wrap:wrap;margin-top:6px;}
@keyframes fu{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:translateY(0);}}
.fade{animation:fu .22s ease forwards;}
@keyframes ck{0%{transform:scale(1);}50%{transform:scale(1.18);}100%{transform:scale(1);}}
.ck{animation:ck .18s ease;}

/* COLLAPSE / DRIFT LISTS */
.cd-list{list-style:none;margin:0;padding:0;}
.cd-list-item{display:flex;align-items:flex-start;gap:10px;padding:7px 0;border-bottom:1px solid rgba(0,0,0,0.04);}
.cd-list-item:last-child{border-bottom:none;}
.cd-list-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-top:6px;}
.cd-list-dot.collapse{background:#C4A09A;}
.cd-list-dot.drift{background:#B8920A;}
.cd-list-text.collapse{font-size:13.5px;color:#8A5A54;line-height:1.55;letter-spacing:0.1px;}
.cd-list-text.drift{font-size:13.5px;color:#6A5000;line-height:1.5;font-weight:500;}

/* SELECTABLE SHIFT STATE ACTIVITIES */
.need-item{display:inline-flex;align-items:center;gap:8px;padding:6px 12px;border-radius:20px;background:#FFFCF8;font-size:13px;color:#6B5A52;border:1px solid #EAE0D6;cursor:pointer;transition:all .2s;margin-bottom:4px;}
.need-item.selected{background:#7A9E7E;border-color:#7A9E7E;color:#FFFFFF;}
.need-item-tick{display:none;}

.need-item-maxed{opacity:0.35;cursor:default;}
.need-item-cap{font-size:11px;color:#B0A49C;font-style:italic;margin-top:4px;text-align:center;display:block;}

.skip-tonight{display:block;width:100%;padding:10px;border:none;background:none;font-size:12px;color:#C4B8B0;text-align:center;cursor:pointer;margin-top:8px;letter-spacing:.5px;}
.skip-tonight:hover{color:#A89E96;}
.skip-tonight-done{text-align:center;padding:14px 0 4px;font-size:13px;color:#C4B8B0;font-style:italic;}

/* JOURNAL CALENDAR */
.journal-cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;}
.journal-past-section-lbl{font-size:9.5px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#B0A49C;display:block;margin-bottom:5px;}
.journal-past-text{font-size:13px;color:#4A3A34;line-height:1.6;white-space:pre-wrap;margin-bottom:10px;}
</style>
</head>

<script>/* ── ANCHOR SEQUENCES ─────────────────────────────────────────────────────── */

var SEQ_GROWTH=[

   subs:[{id:"g_wo_af",label:"Apple Fitness+"},{id:"g_wo_kx",label:"KX Pilates"},{id:"g_wo_walk",label:"Walk"},{id:"g_wo_combo",label:"Combination"}]},
  {id:"g_shower", label:"Shower & get dressed"},

  {id:"g_bfast",  label:"High protein brunch"},

];
var SEQ_STEADY=[
  {id:"m_bed",    label:"Out of bed — feet on the floor"},

  {id:"m_coffee", label:"Tea or coffee"},

  {id:"m_move",   label:"Movement — walk, Apple Fitness+ or KX Pilates", supportive:true},
  {id:"m_light",  label:"Outside light / fresh air", supportive:true}
];
var SEQ_SURVIVAL=[
  {id:"s_bed",    label:"Out of bed — feet on the floor"},
  {id:"s_water",  label:"Water"},
  {id:"s_shower", label:"Shower — or wash face if that's all"},
  {id:"s_eat",    label:"Something to eat — anything"},
  {id:"s_coffee", label:"Tea or coffee"},
  {id:"sv_care",  label:"Bath, long shower, or face mask — whatever feels restorative", supportive:true},
  {id:"sv_move",  label:"Step outside or a short walk — no pressure, no destination", supportive:true}
];
var SEQ_REST=[
  {id:"r_bed",    label:"Out of bed — feet on the floor"},
  {id:"r_water",  label:"Water"},
  {id:"r_shower", label:"Shower & get dressed — or stay comfortable"},
  {id:"r_eat",    label:"Something to eat — no pressure"},
  {id:"r_coffee", label:"Tea or coffee"},

function startup(){

  var daysSince=0;
  if(isNewDay){var last=new Date(lastActive+"T12:00:00");var now=new Date();daysSince=Math.round((now-last)/(1000*60*60*24));}
  function finish(){
    localStorage.setItem("anchor_last_active",tk);
    if(isNewDay&&daysSince>=2)S._returnBanner=true;
    /* Read yesterday's closing mood for continuity banner */
    if(isNewDay){
      var yEnt=getLocalEntry(lastActive);
      if(yEnt&&yEnt.closingMood)S._contBanner=yEnt.closingMood;
    }
    renderTodayPage();scheduleNotifications();
  }
  if(isNewDay){
    S=emptyState();
    var yLocal=getLocalEntry(lastActive);
    /* Carry forward tomorrow's meaningful thing from previous night */
    if(yLocal){
      if(yLocal.stdyTmr)S._carried=yLocal.stdyTmr;
      else if(yLocal.grwthTmr)S._carried=yLocal.grwthTmr;
      else if(yLocal.survQ3)S._carried=yLocal.survQ3;
    }
    pullSB(lastActive).then(function(yr){
      if(yr&&!S._carried){
        if(yr.stdyTmr)S._carried=yr.stdyTmr;
        else if(yr.grwthTmr)S._carried=yr.grwthTmr;
        else if(yr.survQ3)S._carried=yr.survQ3;
      }
      if(yr&&yr.closingMood)S._contBanner=yr.closingMood;
      finish();
    });
  } else {
    var raw=getLocalEntry(tk);if(raw){try{S=normalise(raw);}catch(e){}}
    pullSB(tk).then(function(remote){
      if(remote){S=normalise(remote);try{localStorage.setItem("anchor_"+tk,JSON.stringify(S));}catch(e){}}
      if(!lastActive){
        var y=getLocalEntry(daysAgo(1));
        if(y){if(y.stdyTmr&&!S._carried)S._carried=y.stdyTmr;else if(y.grwthTmr&&!S._carried)S._carried=y.grwthTmr;}
      }
      /* Pull today journal from Supabase if not in local */

      if(!lj.morning&&!lj.evening){
        pullJournalSB(tk).then(function(rj){
          if(rj&&(rj.morning||rj.evening)){
            try{localStorage.setItem(getJournalKey(tk),JSON.stringify(rj));}catch(e){}
          }
        });
      }
      finish();
    });
  }
}

function buildInsights(){
  var insights=[];var tk=todayKey();var entries=[];

    for(var i=0;i<localStorage.length;i++){
      var k=localStorage.key(i);
      if(k&&k.startsWith("anchor_")&&k.indexOf("sb")===-1&&k.indexOf("last_active")===-1&&k.indexOf("journal")===-1){
        var date=k.slice(7);if(/^\d{4}-\d{2}-\d{2}$/.test(date)){var r=getLocalEntry(date);if(r)entries.push(Object.assign({date:date},r));}
      }
    }
  }catch(e){}
  entries.sort(function(a,b){return b.date.localeCompare(a.date);});
  var last30=entries.filter(function(e){return e.date>=daysAgo(30)&&e.date!==tk;});
  var last10=entries.filter(function(e){return e.date>=daysAgo(10)&&e.date!==tk;});
  var last7=entries.filter(function(e){return e.date>=daysAgo(7)&&e.date!==tk;});
  if(last30.length===0)return insights;
  insights.push("I've opened Anchor "+last30.length+" time"+(last30.length!==1?"s":"")+" in the last 30 days.");
  var hardThenReturn=0;
  for(var j=0;j<entries.length-1;j++){
    var curr=entries[j];var prev=entries[j+1];
    if(prev.mode==="survival"||prev.collapseOrDrift==="collapse"||prev.closingMood==="rough"){
      var cd=new Date(curr.date+"T12:00:00");var pd=new Date(prev.date+"T12:00:00");
      if((cd-pd)/(1000*60*60*24)<=3)hardThenReturn++;
    }
  }
  if(hardThenReturn>0)insights.push("I returned after difficult days "+hardThenReturn+" time"+(hardThenReturn!==1?"s":"")+" recently.");
  var moveDays=last10.filter(function(e){return e.anchors&&(e.anchors.m_move||e.anchors.g_wo_af||e.anchors.g_wo_kx||e.anchors.g_wo_walk||e.anchors.g_wo_combo);}).length;
  if(moveDays>0)insights.push("Movement appeared on "+moveDays+" of my last "+Math.min(10,last10.length)+" days.");
  var needCounts={};
  last30.forEach(function(e){if(e.needId)needCounts[e.needId]=(needCounts[e.needId]||0)+1;});
  var topNeed=null;var topCount=0;
  Object.keys(needCounts).forEach(function(k){if(needCounts[k]>topCount){topCount=needCounts[k];topNeed=k;}});
  if(topNeed&&topCount>=3){
    var needObj2=NEEDS.filter(function(n){return n.id===topNeed;})[0];
    if(needObj2)insights.push("I reach for shift state most often when I need to "+needObj2.label.toLowerCase()+".");
  }
  var settledDays=last7.filter(function(e){return e.closingMood==="settled";}).length;
  if(settledDays>=3)insights.push("You closed "+settledDays+" of my last "+Math.min(7,last7.length)+" days feeling settled.");
  var omtDays=last7.filter(function(e){return e.omt&&e.omt.length>2;}).length;
  if(last7.length>=4&&omtDays===0)insights.push("I haven't named my meaningful thing this week.");
  else if(omtDays>=4)insights.push("I've named my meaningful thing most days this week.");
  return insights;
}

function renderMorning(wrap){
  var mode=S.mode;
  if(!mode)return;
  var seq=getMornSeq(mode);
  var anchors=S.anchors;

  /* Find current step index - first step not yet actioned */
  var stepIdx=S.mornSeqStep||0;
  /* Clamp to valid range */
  if(stepIdx>=seq.length)stepIdx=seq.length;

  /* Progress dots */
  var nonSupp=seq.filter(function(s){return !s.supportive;});
  var doneCount=nonSupp.filter(function(s){
    if(s.isParent)return s.subs.some(function(sub){return anchorDone(anchors[sub.id]);});
    return anchorDone(anchors[s.id]);
  }).length;
  var dotsWrap=el("div","");dotsWrap.style="display:flex;gap:6px;justify-content:center;margin-bottom:16px;";
  nonSupp.forEach(function(s,i){
    var dot=el("div","");
    var isDone=s.isParent?s.subs.some(function(sub){return anchorDone(anchors[sub.id]);}):anchorDone(anchors[s.id]);
    dot.style="width:8px;height:8px;border-radius:50%;background:"+(isDone?"#7A9E7E":"#EAE0D6")+";transition:background .3s;";
    dotsWrap.appendChild(dot);
  });
  wrap.appendChild(dotsWrap);

  var showAll=S.mornSeqShowAll;

  /* Build the step list */
  var stepsToShow=showAll?seq:[seq[stepIdx]].filter(Boolean);

  /* If all done — show completion message */
  if(stepIdx>=seq.length||getMornDone(anchors,mode)){
    var doneMsg=el("div","");doneMsg.style="text-align:center;padding:20px 0;";
    doneMsg.appendChild(el("p","","Morning done. That mattered.")).style="font-size:18px;color:#7A9E7E;font-weight:500;margin:0 0 6px";
    wrap.appendChild(doneMsg);
    /* Show all steps lightly if showAll */
    if(showAll){
      seq.forEach(function(step){renderStepDone(wrap,step,anchors);});
    }
    return;
  }

  stepsToShow.forEach(function(step,idx){
    renderStep(wrap,step,anchors,!showAll,function(){
      /* After action — advance step */
      S.mornSeqStep=(S.mornSeqStep||0)+1;
      saveS();renderTodayPage();
    },function(val){
      /* On value change (skip/alt) */
      if(step.isParent){
        /* handled inside */
      } else {
        S.anchors[step.id]=val;
      }
      S.mornSeqStep=(S.mornSeqStep||0)+1;
      saveS();renderTodayPage();
    });
  });

  /* See all / collapse toggle */
  /* Undo last step — quick access */
  if(S.mornSeqStep>0&&!showAll){
    var undoRow=el("div","");undoRow.style="display:flex;justify-content:center;gap:16px;";
    var undoLast=el("button","","Undo last step");
    undoLast.style="background:none;border:none;font-size:11px;color:#C4B8B0;cursor:pointer;padding:4px 0;";
    undoLast.onclick=function(){
      var prevIdx=S.mornSeqStep-1;
      var prevStep=seq[prevIdx];
      if(prevStep){
        if(prevStep.isParent){prevStep.subs.forEach(function(s){S.anchors[s.id]=null;});}
        else{S.anchors[prevStep.id]=null;}
      }
      S.mornSeqStep=prevIdx;
      saveS();renderTodayPage();
    };
    undoRow.appendChild(undoLast);
    wrap.appendChild(undoRow);
  }
  var toggleBtn=el("button","");
  toggleBtn.style="display:block;width:100%;background:none;border:none;font-size:12px;color:#B0A49C;text-align:center;padding:6px 0;cursor:pointer;";
  toggleBtn.textContent=showAll?"Show current step only":"See all steps";
  toggleBtn.onclick=function(){S.mornSeqShowAll=!S.mornSeqShowAll;saveS();renderTodayPage();};
  wrap.appendChild(toggleBtn);
}

function renderStep(wrap,step,anchors,isCurrent,onAdvance,onVal){
  var val=step.isParent?null:anchors[step.id];
  var done=step.isParent?step.subs.some(function(s){return anchorDone(anchors[s.id]);}):anchorDone(val);
  var skipped=!step.isParent&&anchorSkipped(val);
  var hasAlt=!step.isParent&&anchorAlt(val);

  var card=el("div","");
  card.style="background:#FFFCF8;border-radius:16px;border:1.5px solid "+(isCurrent?"#7A9E7E":"#EAE0D6")+";padding:18px;margin-bottom:10px;";

  /* Step label */
  var lbl=el("p","",step.label);
  lbl.style="font-size:"+(isCurrent?"17px":"15px")+";font-weight:"+(isCurrent?"500":"400")+";color:"+(done||skipped?"#B0A49C":"#3A2E28")+";line-height:1.4;margin:0 0 "+(isCurrent?"14px":"8px");
  if(done)lbl.style.textDecoration="line-through";
  card.appendChild(lbl);

  if(step.supportive&&isCurrent){
    var suppNote=el("p","","Supportive — good if it happens, fine if not.");
    suppNote.style="font-size:11px;color:#B0A49C;margin:-8px 0 10px;font-style:italic;";
    card.appendChild(suppNote);
  }

  if(isCurrent&&!done&&!skipped&&!hasAlt){
    /* Workout parent - show sub options */
    if(step.isParent){
      var subGrid=el("div","");subGrid.style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;";
      step.subs.forEach(function(sub){
        var subDone=anchorDone(anchors[sub.id]);
        var subBtn=el("button","",sub.label);
        subBtn.style="padding:7px 14px;border-radius:20px;border:1.5px solid "+(subDone?"#7A9E7E":"#C9BCB4")+";background:"+(subDone?"#D4EAD5":"transparent")+";font-size:13px;color:"+(subDone?"#2A5C30":"#5A4A42")+";cursor:pointer;";
        subBtn.onclick=function(){
          S.anchors[sub.id]=subDone?null:true;
          var anyDone=step.subs.some(function(s){return anchorDone(S.anchors[s.id]);});
          if(anyDone&&!S.mornSeqShowAll){
            S.mornSeqStep=(S.mornSeqStep||0)+1;
          }
          saveS();renderTodayPage();
        };
        subGrid.appendChild(subBtn);
      });
      card.appendChild(subGrid);
    }

    /* Action buttons */
    var btnRow=el("div","");btnRow.style="display:flex;gap:8px;";
    var tickBtn=el("button","","Done");
    tickBtn.style="flex:2;padding:11px;border-radius:11px;border:none;background:#7A9E7E;color:#fff;font-size:15px;font-weight:500;cursor:pointer;";
    tickBtn.onclick=function(){
      if(!step.isParent)S.anchors[step.id]=true;
      S.mornSeqStep=(S.mornSeqStep||0)+1;
      saveS();renderTodayPage();
    };
    btnRow.appendChild(tickBtn);

    /* Skip expander */
    var skipWrap=el("div","");skipWrap.style="flex:1;position:relative;";
    var skipBtn=el("button","","Skip");
    skipBtn.style="width:100%;padding:11px;border-radius:11px;border:1.5px solid #EAE0D6;background:transparent;color:#9E9089;font-size:14px;cursor:pointer;";
    var skipMenu=el("div","");skipMenu.style="display:none;position:absolute;bottom:100%;left:0;right:0;background:#FFFCF8;border:1px solid #EAE0D6;border-radius:11px;margin-bottom:4px;z-index:10;overflow:hidden;";
    var justSkip=el("button","","Skip it");
    justSkip.style="display:block;width:100%;padding:10px 14px;background:none;border:none;text-align:left;font-size:13px;color:#9E9089;cursor:pointer;border-bottom:1px solid #EAE0D6;";
    justSkip.onclick=function(){
      S.anchors[step.id]="skipped";
      S.mornSeqStep=(S.mornSeqStep||0)+1;
      saveS();renderTodayPage();
    };
    var altBtn=el("button","","Did something else →");
    altBtn.style="display:block;width:100%;padding:10px 14px;background:none;border:none;text-align:left;font-size:13px;color:#7A7EAE;cursor:pointer;";
    altBtn.onclick=function(){
      skipMenu.style.display="none";
      /* Show inline text field */
      var altWrap=el("div","");altWrap.style="margin-top:8px;";
      var altInp=document.createElement("input");altInp.type="text";
      altInp.style="width:100%;padding:9px 12px;border:1px solid #7A7EAE;border-radius:9px;font-size:13px;color:#3A2E28;background:#F7F1EB;";
      altInp.placeholder="What did you do instead?";
      var altDone=el("button","","Done");
      altDone.style="margin-top:6px;width:100%;padding:9px;border-radius:9px;border:none;background:#7A7EAE;color:#fff;font-size:13px;cursor:pointer;";
      altDone.onclick=function(){
        S.anchors[step.id]="alt:"+(altInp.value||"alternative");
        S.mornSeqStep=(S.mornSeqStep||0)+1;
        saveS();renderTodayPage();
      };
      altWrap.appendChild(altInp);altWrap.appendChild(altDone);
      card.appendChild(altWrap);
      altInp.focus();
    };
    skipMenu.appendChild(justSkip);skipMenu.appendChild(altBtn);
    skipBtn.onclick=function(e){
      e.stopPropagation();
      skipMenu.style.display=skipMenu.style.display==="none"?"block":"none";
    };
    document.addEventListener("click",function(){skipMenu.style.display="none";},{once:true});
    skipWrap.appendChild(skipBtn);skipWrap.appendChild(skipMenu);
    btnRow.appendChild(skipWrap);
    card.appendChild(btnRow);
  } else if(done||skipped||hasAlt){
    var statusRow=el("div","");statusRow.style="display:flex;align-items:center;justify-content:space-between;gap:8px;";
    var statusLeft=el("div","");statusLeft.style="display:flex;align-items:center;gap:8px;";
    if(done){
      var check=el("span","","✓");check.style="color:#7A9E7E;font-weight:700;font-size:16px;";statusLeft.appendChild(check);
      if(step.isParent){
        var doneSubNames=step.subs.filter(function(s){return anchorDone(anchors[s.id]);}).map(function(s){return s.label;});
        var dnEl=el("span","",doneSubNames.join(", "));dnEl.style="font-size:12px;color:#A8C4A8;";statusLeft.appendChild(dnEl);
      }
    } else if(skipped){
      var sk=el("span","","Skipped");sk.style="font-size:12px;color:#C4B8B0;font-style:italic;";statusLeft.appendChild(sk);
    } else if(hasAlt){
      var at=el("span","","Did: "+anchorAltText(val));at.style="font-size:12px;color:#7A7EAE;font-style:italic;";statusLeft.appendChild(at);
    }
    /* Undo button */
    var undoBtn=el("button","","Undo");
    undoBtn.style="font-size:11px;color:#C4B8B0;background:none;border:none;cursor:pointer;padding:2px 6px;";
    undoBtn.onclick=function(){
      if(step.isParent){step.subs.forEach(function(s){S.anchors[s.id]=null;});}
      else{S.anchors[step.id]=null;}
      if(S.mornSeqStep>0)S.mornSeqStep=S.mornSeqStep-1;
      saveS();renderTodayPage();
    };
    statusRow.appendChild(statusLeft);statusRow.appendChild(undoBtn);
    card.appendChild(statusRow);
  }

  wrap.appendChild(card);
}

function renderStepDone(wrap,step,anchors){
  /* Compact done display for show-all after completion */
  renderStep(wrap,step,anchors,false,null,null);
}

/* ── SEQUENTIAL EVENING RENDER ────────────────────────────────────────────── */
function renderEvening(wrap){
  var mode=S.mode;if(!mode)return;
  var seq=getEveSeq(mode);
  var anchors=S.anchors;
  var stepIdx=S.eveSeqStep||0;
  if(stepIdx>=seq.length)stepIdx=seq.length;

  var nonSupp=seq.filter(function(s){return !s.supportive;});
  var doneCount=nonSupp.filter(function(s){return anchorDone(anchors[s.id]);}).length;

  /* Progress dots */
  var dotsWrap=el("div","");dotsWrap.style="display:flex;gap:6px;justify-content:center;margin-bottom:16px;";
  nonSupp.forEach(function(s){
    var dot=el("div","");
    dot.style="width:8px;height:8px;border-radius:50%;background:"+(anchorDone(anchors[s.id])?"#7A7EAE":"#EAE0D6")+";transition:background .3s;";
    dotsWrap.appendChild(dot);
  });
  wrap.appendChild(dotsWrap);

  var showAll=S.eveSeqShowAll;

  /* All done */
  if(getEveDone(anchors,mode)||stepIdx>=seq.length){
    var doneMsg=el("div","");doneMsg.style="text-align:center;padding:20px 0;";
    doneMsg.appendChild(el("p","","Day closed. That's enough.")).style="font-size:18px;color:#7A7EAE;font-weight:500;margin:0 0 6px";
    wrap.appendChild(doneMsg);
    if(showAll){seq.forEach(function(step){renderEveStep(wrap,step,anchors,false);});}
    return;
  }

  var stepsToShow=showAll?seq:[seq[stepIdx]].filter(Boolean);
  stepsToShow.forEach(function(step){
    renderEveStep(wrap,step,anchors,!showAll);
  });

  if(S.eveSeqStep>0&&!showAll){
    var eveUndoRow=el("div","");eveUndoRow.style="display:flex;justify-content:center;";
    var eveUndoLast=el("button","","Undo last step");
    eveUndoLast.style="background:none;border:none;font-size:11px;color:#C4B8B0;cursor:pointer;padding:4px 0;";
    eveUndoLast.onclick=function(){
      var prevIdx=S.eveSeqStep-1;
      var prevStep=seq[prevIdx];
      if(prevStep)S.anchors[prevStep.id]=null;
      S.eveSeqStep=prevIdx;
      saveS();renderTodayPage();
    };
    eveUndoRow.appendChild(eveUndoLast);
    wrap.appendChild(eveUndoRow);
  }
  var toggleBtn=el("button","");
  toggleBtn.style="display:block;width:100%;background:none;border:none;font-size:12px;color:#B0A49C;text-align:center;padding:6px 0;cursor:pointer;";
  toggleBtn.textContent=showAll?"Show current step only":"See all steps";
  toggleBtn.onclick=function(){S.eveSeqShowAll=!S.eveSeqShowAll;saveS();renderTodayPage();};
  wrap.appendChild(toggleBtn);
}

function renderEveStep(wrap,step,anchors,isCurrent){
  var val=anchors[step.id];
  var done=anchorDone(val);var skipped=anchorSkipped(val);var hasAlt=anchorAlt(val);

  card.style="background:#FFFCF8;border-radius:16px;border:1.5px solid "+(isCurrent?"#7A7EAE":"#EAE0D6")+";padding:18px;margin-bottom:10px;";
  var lbl=el("p","",step.label);
  lbl.style="font-size:"+(isCurrent?"17px":"15px")+";font-weight:"+(isCurrent?"500":"400")+";color:"+(done||skipped?"#B0A49C":"#3A2E28")+";line-height:1.4;margin:0 0 "+(isCurrent?"14px":"8px");
  if(done)lbl.style.textDecoration="line-through";
  card.appendChild(lbl);

  if(step.supportive&&isCurrent){

  if(isCurrent&&!done&&!skipped&&!hasAlt){

      pdBtn.onclick=function(){

      card.appendChild(pdBtn);
    } else {
      var btnRow=el("div","");btnRow.style="display:flex;gap:8px;";
      var tickBtn=el("button","","Done");

      tickBtn.onclick=function(){
        S.anchors[step.id]=true;
        S.eveSeqStep=(S.eveSeqStep||0)+1;
        saveS();renderTodayPage();
      };
      btnRow.appendChild(tickBtn);
      var skipWrap=el("div","");skipWrap.style="flex:1;position:relative;";
      var skipBtn=el("button","","Skip");
      skipBtn.style="width:100%;padding:11px;border-radius:11px;border:1.5px solid #EAE0D6;background:transparent;color:#9E9089;font-size:14px;cursor:pointer;";
      var skipMenu=el("div","");skipMenu.style="display:none;position:absolute;bottom:100%;left:0;right:0;background:#FFFCF8;border:1px solid #EAE0D6;border-radius:11px;margin-bottom:4px;z-index:10;overflow:hidden;";
      var js=el("button","","Skip it");js.style="display:block;width:100%;padding:10px 14px;background:none;border:none;text-align:left;font-size:13px;color:#9E9089;cursor:pointer;border-bottom:1px solid #EAE0D6;";
      js.onclick=function(){S.anchors[step.id]="skipped";S.eveSeqStep=(S.eveSeqStep||0)+1;saveS();renderTodayPage();};
      var ab=el("button","","Did something else →");ab.style="display:block;width:100%;padding:10px 14px;background:none;border:none;text-align:left;font-size:13px;color:#7A7EAE;cursor:pointer;";
      ab.onclick=function(){
        skipMenu.style.display="none";
        var aw=el("div","");aw.style="margin-top:8px;";
        var ai=document.createElement("input");ai.type="text";ai.style="width:100%;padding:9px 12px;border:1px solid #7A7EAE;border-radius:9px;font-size:13px;color:#3A2E28;background:#F7F1EB;";ai.placeholder="What did you do instead?";
        var ad=el("button","","Done");ad.style="margin-top:6px;width:100%;padding:9px;border-radius:9px;border:none;background:#7A7EAE;color:#fff;font-size:13px;cursor:pointer;";
        ad.onclick=function(){S.anchors[step.id]="alt:"+(ai.value||"alternative");S.eveSeqStep=(S.eveSeqStep||0)+1;saveS();renderTodayPage();};
        aw.appendChild(ai);aw.appendChild(ad);card.appendChild(aw);ai.focus();
      };
      skipMenu.appendChild(js);skipMenu.appendChild(ab);
      skipBtn.onclick=function(e){e.stopPropagation();skipMenu.style.display=skipMenu.style.display==="none"?"block":"none";};
      document.addEventListener("click",function(){skipMenu.style.display="none";},{once:true});
      skipWrap.appendChild(skipBtn);skipWrap.appendChild(skipMenu);
      btnRow.appendChild(skipWrap);card.appendChild(btnRow);
    }
  } else if(done||skipped||hasAlt){
    var sr=el("div","");sr.style="display:flex;align-items:center;justify-content:space-between;gap:8px;";
    var srLeft=el("div","");srLeft.style="display:flex;align-items:center;gap:8px;";
    if(done){var ck=el("span","","✓");ck.style="color:#7A7EAE;font-weight:700;font-size:16px;";srLeft.appendChild(ck);}

function showClosingScreen(){
  var overlay=el("div","");
  overlay.style="position:fixed;top:0;left:0;right:0;bottom:0;background:#F2EBE2;display:flex;align-items:center;justify-content:center;flex-direction:column;z-index:999;";
  var msg=el("p","","Anchor is closed for tonight.");msg.style="font-size:22px;color:#3A2E28;font-weight:500;margin:0 0 10px;text-align:center;";
  var sub=el("p","","Rest well.");sub.style="font-size:16px;color:#9E9089;font-style:italic;margin:0;text-align:center;";
  var logo=el("p","","⚓");logo.style="font-size:60px;margin:0 0 24px;";
  overlay.appendChild(logo);overlay.appendChild(msg);overlay.appendChild(sub);

  setTimeout(function(){

/* ── RENDER TODAY PAGE ────────────────────────────────────────────────────── */
function renderTodayPage(){
  var wrap=document.getElementById("view-today");
  wrap.innerHTML="";
  var isSurvival=S.mode==="survival";
  var isGrowth=S.mode==="growth";
  var isSteady=S.mode==="steady";
  var isRest=S.mode==="rest";
  var dateStr=new Date().toLocaleDateString("en-GB",{weekday:"long",day:"numeric",month:"long"});

  /* RETURN BANNER */
  if(S._returnBanner&&!returnBannerDismissed){
    var rb=el("div","return-banner");
    rb.appendChild(el("div","return-text","I'm back. Rhythm resumes here. Missed time is not owed."));
    var rbc=el("button","banner-close","×");rbc.onclick=function(){returnBannerDismissed=true;rb.style.display="none";};
    rb.appendChild(rbc);wrap.appendChild(rb);
  }

  /* CONTINUITY BANNER */
  if(S._contBanner&&!contBannerDismissed){
    var mood=S._contBanner;
    var bannerLines=CONT_BANNERS[mood]||[];
    if(bannerLines.length>0){
      var line=bannerLines[new Date().getDay()%bannerLines.length];
      var cb=el("div","continuity-banner "+mood);cb.id="cont-banner";
      cb.appendChild(el("span","continuity-banner-text",line));
      var cbc=el("button","banner-close","×");
      cbc.onclick=function(){dismissContBanner();};
      cb.appendChild(cbc);wrap.appendChild(cb);
    }
  }

  /* HEADER */
  var hdr=el("div");
  hdr.appendChild(el("p","header-h1",dateStr));
  hdr.appendChild(el("p","header-phrase",PHRASES[new Date().getDay()]));
  if(S._carried){
    var carry=el("div","carry");
    var ctag=el("span","","From yesterday");ctag.style="font-size:10px;color:#B0A49C;letter-spacing:1px;text-transform:uppercase;flex-shrink:0";
    var cval=el("span","",'"'+S._carried+'"');cval.style="font-size:13px;color:#4A3A34;font-style:italic;margin-left:6px";
    carry.appendChild(ctag);carry.appendChild(cval);hdr.appendChild(carry);
  }
  wrap.appendChild(hdr);

  /* ── 1. MODE SELECTION ───────────────────────────────────────────────────── */
  var modeCard=el("div","mode-card");
  modeCard.appendChild(el("span","entering-label","How am I entering today?"));
  var modeRow=el("div","mode-row");
  [{k:"survival",l:"Low"},{k:"steady",l:"Okay"},{k:"growth",l:"Good"},{k:"rest",l:"Resting"}].forEach(function(m){
    var btn=el("button","mode-btn "+m.k+(S.mode===m.k?" active":""),m.l);
    btn.onclick=function(){
      if(S.mode===m.k){S.mode=null;}
      else{
        if(S.mode!==m.k){S.anchors={};S.mornSeqStep=0;S.eveSeqStep=0;S.mornSeqShowAll=false;S.eveSeqShowAll=false;}
        S.mode=m.k;dismissContBanner();
      }
      saveS();renderTodayPage();
    };
    modeRow.appendChild(btn);
  });
  modeCard.appendChild(modeRow);
  if(S.mode)modeCard.appendChild(el("p","mode-sub",MODE_SUBS[S.mode]));
  wrap.appendChild(modeCard);

  /* ── 2. WHEN I NEED GROUNDING (frozen + rules, collapsible) ─────────────── */
  var groundOpen=S.openSections.grounding||false;
  var groundWrap=el("div","section"+(groundOpen?" open":""));

/* ── NOTIFICATIONS ────────────────────────────────────────────────────────── */
function getNotifSettings(){
  try{var n=localStorage.getItem("anchor_notif");return n?JSON.parse(n):{mornOn:false,mornTime:"08:00",eveOn:false,eveTime:"18:00"};}
  catch(e){return {mornOn:false,mornTime:"08:00",eveOn:false,eveTime:"18:00"};}
}
function saveNotifSettings(s){try{localStorage.setItem("anchor_notif",JSON.stringify(s));}catch(e){}}

function scheduleNotifications(){
  if(!("Notification" in window))return;
  if(Notification.permission!=="granted")return;
  var ns=getNotifSettings();
  /* Cancel existing - we use localStorage to track scheduled times */
  if(ns.mornOn)scheduleDailyNotif("anchor_notif_morn",ns.mornTime,getMornNotifMsg());
  if(ns.eveOn)scheduleDailyNotif("anchor_notif_eve",ns.eveTime,"How's the day closing? Take a minute with Anchor.");
}

function getMornNotifMsg(){
  /* Pull context from last entry */
  var lastActive=localStorage.getItem("anchor_last_active");
  if(lastActive){
    var last=getLocalEntry(lastActive);
    if(last){
      if(last.closingMood==="rough")return "Morning. Yesterday was hard. Starting smaller today.";
      if(last.tmrOmt&&last.tmrOmt.trim())return "Morning. Yesterday you planned: "+last.tmrOmt.trim().slice(0,40)+". Anchor is here.";
      if(last.omt&&last.omt.trim())return "Morning. Yesterday you were working on "+last.omt.trim().slice(0,40)+". Anchor is here.";
    }
  }
  return "Good morning. Anchor is here when you're ready.";
}

function scheduleDailyNotif(key,timeStr,msg){
  /* Use setTimeout to fire notification at next occurrence of timeStr today or tomorrow */
  var parts=timeStr.split(":");
  var h=parseInt(parts[0]);var m2=parseInt(parts[1]);
  var now=new Date();
  var target=new Date();
  target.setHours(h,m2,0,0);
  if(target<=now)target.setDate(target.getDate()+1);
  var delay=target-now;
  var existing=localStorage.getItem(key+"_timeout");
  if(existing)clearTimeout(parseInt(existing));
  var tid=setTimeout(function(){
    if(Notification.permission==="granted"){
      new Notification("Anchor",{body:msg,icon:"apple-touch-icon.png",badge:"apple-touch-icon.png"});
    }
    /* Reschedule for tomorrow */
    scheduleDailyNotif(key,timeStr,msg);
  },delay);
  try{localStorage.setItem(key+"_timeout",String(tid));}catch(e){}
}

async function requestNotifPermission(){
  if(!("Notification" in window))return "unsupported";
  if(Notification.permission==="granted")return "granted";
  var result=await Notification.requestPermission();
  return result;
}


/* JOURNAL */
function getJournalKey(dk){return "anchor_journal_"+dk;}
function getJournalEntry(dk){try{var r=localStorage.getItem(getJournalKey(dk));return r?JSON.parse(r):{morning:"",evening:""};}catch(e){return {morning:"",evening:""};}}
function saveJournalEntry(dk,entry){
  try{localStorage.setItem(getJournalKey(dk),JSON.stringify(entry));}catch(e){}
  pushJournalSB(dk,entry);
}
function pushJournalSB(dk,entry){
  var sb=getSB();if(!sb)return;
  sb.from("journal_logs").upsert({date:dk,data:entry,updated_at:new Date().toISOString()},{onConflict:"date"}).catch(function(){});
}
function pullJournalSB(dk){
  var sb=getSB();if(!sb)return Promise.resolve(null);
  return sb.from("journal_logs").select("data").eq("date",dk).single().then(function(r){
    if(r.error||!r.data)return null;return r.data.data;
  }).catch(function(){return null;});
}
function pullAllJournalSB(){
  var sb=getSB();if(!sb)return Promise.resolve(null);
  return sb.from("journal_logs").select("date,data").order("date",{ascending:false}).limit(365).then(function(r){
    if(r.error||!r.data)return null;
    return r.data.map(function(row){return {date:row.date,morning:row.data.morning||"",evening:row.data.evening||""};});

  var daysInMonth=new Date(y,m,0).getDate();

  /* Empty cells before first day */
  for(var i=0;i<firstDay;i++){

/* CONTINUITY */
function buildInsights(){
  var insights=[];var tk=todayKey();var entries=[];
  try{
    for(var i=0;i<localStorage.length;i++){
      var k=localStorage.key(i);
      if(k&&k.startsWith("anchor_")&&k.indexOf("sb")===-1&&k.indexOf("last_active")===-1&&k.indexOf("journal")===-1){
        var date=k.slice(7);if(/^\d{4}-\d{2}-\d{2}$/.test(date)){var r=getLocalEntry(date);if(r)entries.push(Object.assign({date:date},r));}
      }
    }
  }catch(e){}
  entries.sort(function(a,b){return b.date.localeCompare(a.date);});
  var last30=entries.filter(function(e){return e.date>=daysAgo(30)&&e.date!==tk;});
  var last10=entries.filter(function(e){return e.date>=daysAgo(10)&&e.date!==tk;});
  var last7=entries.filter(function(e){return e.date>=daysAgo(7)&&e.date!==tk;});
  if(last30.length===0)return insights;
  insights.push("I've opened Anchor "+last30.length+" time"+(last30.length!==1?"s":"")+" in the last 30 days.");
  var hardThenReturn=0;
  for(var j=0;j<entries.length-1;j++){
    var curr=entries[j];var prev=entries[j+1];
    if(prev.mode==="survival"||prev.collapseOrDrift==="collapse"||prev.closingMood==="rough"){
      var cd=new Date(curr.date+"T12:00:00");var pd=new Date(prev.date+"T12:00:00");
      if((cd-pd)/(1000*60*60*24)<=3)hardThenReturn++;
    }
  }
  if(hardThenReturn>0)insights.push("I returned after difficult days "+hardThenReturn+" time"+(hardThenReturn!==1?"s":"")+" recently.");
  var moveDays=last10.filter(function(e){return e.anchors&&(e.anchors.m_move||e.anchors.g_wo_af||e.anchors.g_wo_kx||e.anchors.g_wo_walk||e.anchors.g_wo_combo);}).length;
  if(moveDays>0)insights.push("Movement appeared on "+moveDays+" of my last "+Math.min(10,last10.length)+" days.");
  var needCounts={};
  last30.forEach(function(e){if(e.needId)needCounts[e.needId]=(needCounts[e.needId]||0)+1;});
  var topNeed=null;var topCount=0;
  Object.keys(needCounts).forEach(function(k2){if(needCounts[k2]>topCount){topCount=needCounts[k2];topNeed=k2;}});
  if(topNeed&&topCount>=3){var needObj2=NEEDS.filter(function(n){return n.id===topNeed;})[0];if(needObj2)insights.push("I reach for shift state most often when I need to "+needObj2.label.toLowerCase()+".");}
  var settledDays=last7.filter(function(e){return e.closingMood==="settled";}).length;
  if(settledDays>=3)insights.push("I closed "+settledDays+" of my last "+Math.min(7,last7.length)+" days feeling settled.");
  var omtDays=last7.filter(function(e){return e.omt&&e.omt.length>2;}).length;
  if(last7.length>=4&&omtDays===0)insights.push("I haven't named my meaningful thing this week.");
  else if(omtDays>=4)insights.push("I've named my meaningful thing most days this week.");
  return insights;
}

/* Anchor label lookup */
function getAnchorLabel(id){
  var allAnchors=SURV_MORN.concat(SURV_EVE).concat(STDY_MORN_ESS).concat(STDY_MORN_BON).concat(STDY_EVE_ESS).concat(STDY_EVE_BON).concat(GRWTH_EVE).concat(REST_MORN_ESS).concat(REST_MORN_OPT).concat(REST_EVE);
  /* Growth morning has parent+subs */
  var grwthFlat=[];
  GRWTH_MORN.forEach(function(a){
    if(a.isParent){a.subs.forEach(function(s){grwthFlat.push(s);});}
    else{grwthFlat.push(a);}
  });
  allAnchors=allAnchors.concat(grwthFlat);
  var found=allAnchors.filter(function(a){return a.id===id;})[0];
  return found?found.label:id;
}

      var colItems=["Drink water","Shower — or wash my face if that's all I can do","Eat something real — protein if possible","Lie down or rest intentionally","Keep stimulation lower tonight","No deciding my life tonight","Tomorrow resumes from here"];
      var colDone=colItems.filter(function(s,i){return entry.collapseChecked&&!!entry.collapseChecked[i];});
      var colContent="Collapse"+(colDone.length>0?"\n"+colDone.join("\n"):"");
      logSection("Hard day",colContent);
    } else if(entry.collapseOrDrift==="drift"){
      var driftItems2=["Drink water","Touch the meaningful thing","Complete one maintenance task","Step outside briefly","Reduce input before adding more plans","Momentum before optimisation","Tomorrow resumes from here"];
      var driftDone=driftItems2.filter(function(s,i){return entry.driftChecked&&!!entry.driftChecked[i];});
      var driftContent="Drift"+(driftDone.length>0?"\n"+driftDone.join("\n"):"");
      logSection("Hard day",driftContent);
    }

    /* 7. Reflection */
    if(entry.skipReflection){
      logSection("Reflection","Skipped tonight");
    } else {
      var cm=entry.closingMood;
      var reflParts=[];
      if(cm==="rough"){
        if(entry.survQ1)reflParts.push("Did I get through: "+entry.survQ1);
        if(entry.survQ2)reflParts.push("What kept me going: "+entry.survQ2);
        if(entry.survQ3)reflParts.push("Need tomorrow: "+entry.survQ3);
      } else if(cm==="tired"){
        if(entry.stdyQ1)reflParts.push("Went okay: "+entry.stdyQ1);
        if(entry.stdyQ3)reflParts.push("Need to feel rested: "+entry.stdyQ3);

      } else if(cm==="restless"){
        if(entry.grwthQ1)reflParts.push("Still running: "+entry.grwthQ1);
        if(entry.stdyQ2)reflParts.push("What moved: "+entry.stdyQ2);
        if(entry.stdyQ3)reflParts.push("Help me land: "+entry.stdyQ3);

      } else if(cm==="settled"){
        if(entry.grwthQ1)reflParts.push("Felt meaningful: "+entry.grwthQ1);
        if(entry.stdyQ2)reflParts.push("What moved: "+entry.stdyQ2);
        if(entry.grwthQ2)reflParts.push("Meaningful thing: "+entry.grwthQ2);
        if(entry.grwthQ3)reflParts.push("Avoided: "+entry.grwthQ3);

      }
      if(reflParts.length>0)logList("Reflection",reflParts);
    }

    /* 8. Tomorrow's meaningful thing */
    var tmr=entry.stdyTmr||entry.grwthTmr||"";
    if(tmr&&tmr.trim())logSection("Tomorrow's meaningful thing",tmr);

    /* 9. Weekly reflection */
    logSection("Weekly reflection",entry.weeklyReflection);

    /* Backwards compat — old field names from pre-restructure entries */
    if(!hBody.hasChildNodes()){
      logSection("Meaningful thing",entry.omt);
      logSection("Went well",entry.win);
      logSection("What moved",entry.whatMattered);
      logSection("Avoided",entry.whatAvoided);
      logSection("Tomorrow",entry.tmrOmt||entry.stdyTmr||entry.grwthTmr);
      logSection("Weekly reflection",entry.weeklyReflection);
    }
    /* Nothing at all */
    if(!hBody.hasChildNodes()){
      var np=el("p","","No notes recorded for this day.");np.style="font-size:13px;color:#B0A49C;font-style:italic";hBody.appendChild(np);
    }

    hdrBtn.onclick=function(){hBody.classList.toggle("open");chev.style.transform=hBody.classList.contains("open")?"rotate(180deg)":"none";};
    div.appendChild(hdrBtn);div.appendChild(hBody);wrap.appendChild(div);
  });
}


/* SETTINGS */
function renderSettings(){
  var wrap=document.getElementById("view-settings");wrap.innerHTML="";
  var cfg=getSBConfig()||{};
  var title=el("p","","Settings");title.style="font-size:24px;font-weight:500;color:#241C18;margin:0 0 3px";wrap.appendChild(title);
  var sub=el("p","","Connect Supabase to sync across all my devices.");sub.style="font-size:13px;color:#9E9089;margin:0 0 16px;font-style:italic";wrap.appendChild(sub);
  var sc=el("div","settings-card");
  var slbl=el("p","","Supabase sync");slbl.style="font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#7A9E7E;margin:0 0 14px";sc.appendChild(slbl);
  var sf1=el("div","settings-field");sf1.appendChild(el("label","settings-label","Project URL"));
  var urlI=document.createElement("input");urlI.className="settings-input";urlI.id="sb-url";urlI.type="url";urlI.placeholder="https://xxxx.supabase.co";urlI.value=cfg.url||"";sf1.appendChild(urlI);sc.appendChild(sf1);
  var sf2=el("div","settings-field");sf2.appendChild(el("label","settings-label","Anon Key"));
  var keyI=document.createElement("input");keyI.className="settings-input";keyI.id="sb-key";keyI.type="text";keyI.placeholder="eyJh...";keyI.value=cfg.key||"";sf2.appendChild(keyI);sc.appendChild(sf2);
  var saveBtn=el("button","settings-btn","Save & connect");saveBtn.onclick=saveSupabaseConfig;sc.appendChild(saveBtn);
  if(cfg.url){var discBtn=el("button","settings-btn danger","Disconnect");discBtn.style.marginTop="8px";discBtn.onclick=disconnectSB;sc.appendChild(discBtn);}
  var res=el("div","");res.id="sb-result";res.style="margin-top:10px;font-size:13px;color:#9E9089";sc.appendChild(res);wrap.appendChild(sc);
  var hc=el("div","settings-card");var hlbl=el("p","","Sync history");hlbl.style="font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#B0A49C;margin:0 0 12px";hc.appendChild(hlbl);
  var pullBtn=el("button","settings-btn secondary","Pull all history from Supabase");pullBtn.onclick=syncAllHistory;hc.appendChild(pullBtn);wrap.appendChild(hc);

  /* NOTIFICATIONS */
  var nc=el("div","settings-card");
  var nlbl=el("p","","Notifications");nlbl.style="font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#7A9E7E;margin:0 0 14px";nc.appendChild(nlbl);
  var ns2=getNotifSettings();
  /* Morning */
  var mornRow=el("div","");mornRow.style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;";
  var mornLbl2=el("div","");
  mornLbl2.appendChild(el("p","settings-label","Morning nudge"));
  var mornTimeInp=document.createElement("input");mornTimeInp.type="time";mornTimeInp.className="settings-input";mornTimeInp.style.width="120px";mornTimeInp.value=ns2.mornTime||"08:00";
  mornLbl2.appendChild(mornTimeInp);
  var mornToggle=el("button","",ns2.mornOn?"On":"Off");
  mornToggle.style="padding:8px 16px;border-radius:20px;border:none;background:"+(ns2.mornOn?"#7A9E7E":"#EAE0D6")+";color:"+(ns2.mornOn?"#fff":"#9E9089")+";font-size:13px;cursor:pointer;";
  mornToggle.onclick=function(){var s3=getNotifSettings();s3.mornOn=!s3.mornOn;s3.mornTime=mornTimeInp.value;saveNotifSettings(s3);mornToggle.textContent=s3.mornOn?"On":"Off";mornToggle.style.background=s3.mornOn?"#7A9E7E":"#EAE0D6";mornToggle.style.color=s3.mornOn?"#fff":"#9E9089";if(s3.mornOn)scheduleNotifications();};
  mornRow.appendChild(mornLbl2);mornRow.appendChild(mornToggle);nc.appendChild(mornRow);
  /* Evening */
  var eveRow=el("div","");eveRow.style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;";
  var eveLbl2=el("div","");
  eveLbl2.appendChild(el("p","settings-label","Evening nudge"));
  var eveTimeInp=document.createElement("input");eveTimeInp.type="time";eveTimeInp.className="settings-input";eveTimeInp.style.width="120px";eveTimeInp.value=ns2.eveTime||"18:00";
  eveLbl2.appendChild(eveTimeInp);
  var eveToggle=el("button","",ns2.eveOn?"On":"Off");
  eveToggle.style="padding:8px 16px;border-radius:20px;border:none;background:"+(ns2.eveOn?"#7A9E7E":"#EAE0D6")+";color:"+(ns2.eveOn?"#fff":"#9E9089")+";font-size:13px;cursor:pointer;";
  eveToggle.onclick=function(){var s4=getNotifSettings();s4.eveOn=!s4.eveOn;s4.eveTime=eveTimeInp.value;saveNotifSettings(s4);eveToggle.textContent=s4.eveOn?"On":"Off";eveToggle.style.background=s4.eveOn?"#7A9E7E":"#EAE0D6";eveToggle.style.color=s4.eveOn?"#fff":"#9E9089";if(s4.eveOn)scheduleNotifications();};
  eveRow.appendChild(eveLbl2);eveRow.appendChild(eveToggle);nc.appendChild(eveRow);
  /* Permission button */
  var permBtn=el("button","settings-btn secondary","Enable notifications");
  permBtn.onclick=async function(){var r=await requestNotifPermission();permBtn.textContent=r==="granted"?"Notifications enabled ✓":"Permission denied — check Safari settings";permBtn.style.background=r==="granted"?"#D4EAD5":"#FEF5F4";};
  nc.appendChild(permBtn);
  var permNote=el("p","","Requires Anchor to be added to your home screen. Enable in Safari settings if prompted.");permNote.style="font-size:11px;color:#C4B8B0;margin-top:8px;line-height:1.5;";nc.appendChild(permNote);
  wrap.appendChild(nc);
  var rc=el("div","settings-card");var rlbl=el("p","","Reset");rlbl.style="font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#C17060;margin:0 0 12px";rc.appendChild(rlbl);
  var clrBtn=el("button","settings-btn danger","Clear local data");clrBtn.onclick=function(){if(confirm("Clear all local data?"))clearLocal();};rc.appendChild(clrBtn);wrap.appendChild(rc);
}
function saveSupabaseConfig(){
  var url=document.getElementById("sb-url").value.trim().replace(/\/$/,"");
  var key=document.getElementById("sb-key").value.trim();
  var res=document.getElementById("sb-result");
  if(!url||!key){res.textContent="Please enter both URL and key.";return;}
  res.textContent="Testing...";res.style.color="#9E9089";
  _sb=null;saveSBConfig(url,key);
  var lib=window.supabase||window.Supabase;
  if(!lib||!lib.createClient){res.textContent="Supabase library not loaded.";res.style.color="#C17060";return;}
  var tc=lib.createClient(url,key);
  tc.from("daily_logs").select("date").limit(1).then(function(r){
    if(r.error){res.textContent="Error: "+r.error.message;res.style.color="#C17060";_sb=null;return;}
    _sb=tc;res.textContent="Connected and synced!";res.style.color="#7A9E7E";pushSB(S);
  }).catch(function(e){res.textContent="Failed: "+(e.message||"Unknown error");res.style.color="#C17060";_sb=null;});
}
function disconnectSB(){if(!confirm("Disconnect?"))return;localStorage.removeItem("anchor_sb");_sb=null;renderSettings();}
function syncAllHistory(){
  var tk=todayKey();
  pullAllSB().then(function(hist){
    if(!hist){alert("Could not pull history. Check connection.");return;}
    hist.forEach(function(entry){var date=entry.date;var data=Object.assign({},entry);delete data.date;if(date!==tk){try{localStorage.setItem("anchor_"+date,JSON.stringify(data));}catch(e){}}});
    /* Also pull all journal entries */
    pullAllJournalSB().then(function(journals){
      var jCount=0;
      if(journals){
        journals.forEach(function(entry){
          if(!entry.morning&&!entry.evening)return;
          var local=getJournalEntry(entry.date);
          if(!local.morning&&!local.evening){
            try{localStorage.setItem(getJournalKey(entry.date),JSON.stringify({morning:entry.morning,evening:entry.evening}));jCount++;}catch(e){}
          }
        });
      }
      alert("Done — "+hist.length+" days of structured data and "+(journals?journals.length:0)+" journal entries pulled.");
    });
  });
}
function clearLocal(){
  var keys=[];for(var i=0;i<localStorage.length;i++){var k=localStorage.key(i);if(k&&k.startsWith("anchor_")&&k.indexOf("sb")===-1)keys.push(k);}
  keys.forEach(function(k){localStorage.removeItem(k);});S=emptyState();startup();switchView("today");
}

/* SWITCH VIEW */
function switchView(v){
  currentView=v;
  document.getElementById("view-today").style.display=v==="today"?"flex":"none";
  document.getElementById("view-journal").style.display=v==="journal"?"flex":"none";
  document.getElementById("view-continuity").style.display=v==="continuity"?"flex":"none";
  document.getElementById("view-settings").style.display=v==="settings"?"flex":"none";
  document.querySelectorAll(".nav-tab").forEach(function(b){
    var t=b.textContent.trim().toLowerCase();
    b.classList.toggle("active",t===v||(v==="settings"&&(t==="⚙️"||b.innerHTML.indexOf("9881")!==-1)));
  });
  if(v==="today"){renderTodayPage();return;}if(v==="journal")renderJournal();
  if(v==="continuity")renderContinuity();
  if(v==="settings")renderSettings();
}

startup();
